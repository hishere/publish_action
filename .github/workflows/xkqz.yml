name: UABEAvalonia CI - Windows
on: push
jobs:
  run-app:
    runs-on: windows-latest
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 创建解压目录
      - name: Create target directory
        run: mkdir UABE

      # 3. 解压 ZIP 文件（使用 PowerShell 原生命令）
      - name: Unpack ZIP
        shell: powershell
        run: |
          Expand-Archive -Path tool.zip -DestinationPath UABE -Force

      # 4. 运行应用程序
      - name: Run Application
        run: |
          cd UABE
          start AssetBundleExtractor.exe
