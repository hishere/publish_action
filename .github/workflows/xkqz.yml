name: UABEAvalonia CI

on: push

jobs:
  run-app:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4  # 官方检出插件[1,3](@ref)

      # 2. 安装.NET运行时（核心依赖）
      - name: Setup .NET 6.0 Runtime
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x  # 指定运行时版本[4,5](@ref)

      # 3. 安装图形依赖库
      - name: Install graphics dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglx-mesa0 libgtk-3-0  # Linux图形基础库[7](@ref)

      # 4. 配置虚拟显示服务器（核心修复）
      - name: Setup Xvfb
        uses: coactions/setup-xvfb@v1  # 虚拟显示服务[8](@ref)
        with:
          display: :99          # 指定显示编号
          screen: '0'           # 屏幕编号
          resolution: 1024x768  # 显示分辨率
          depth: 24             # 颜色深度

      # 5. 解压应用文件
      - name: Unzip application
        run: |
          unzip uabea-ubuntu.zip
          chmod +x UABEAvalonia  # 添加执行权限[3](@ref)

      # 6. 运行图形应用程序
      - name: Run UABEAvalonia
        env:
          DISPLAY: :99  # 指定虚拟显示器[6,7](@ref)
        run: ./UABEAvalonia
