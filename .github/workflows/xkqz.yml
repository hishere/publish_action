name: UABEAvalonia CI - Windows
on: push
jobs:
  run-app:
    runs-on: windows-latest
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 创建目标目录 D:\a（关键修正）
      - name: Create D:\a directory
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "D:\a" -Force | Out-Null

      # 3. 解压到 D:\a（路径修正）
      - name: Unpack ZIP to D:\a
        shell: powershell
        run: |
          Expand-Archive -Path tool.zip -DestinationPath "D:\a" -Force  # 目标路径改为 D:\a

      # 5. 运行应用程序
      - name: Run Application
        shell: powershell
        run: |
          Start-Process -FilePath "D:\a\UABE\AssetBundleExtractor.exe"

      # 等待5秒后截图
      - name: Capture Screenshot
        shell: powershell
        run: |
          $screenshotDir = "D:\a\product"
          New-Item -Path $screenshotDir -ItemType Directory -Force
          Add-Type -AssemblyName System.Windows.Forms
          $bmp = New-Object System.Drawing.Bitmap([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Width, [System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bmp)
          $graphics.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
          $bmp.Save("$screenshotDir\screenshot.png")
          $graphics.Dispose()

      # 上传产物（新增核心步骤）
      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshot   # 产物名称
          path: D:\a\product\screenshot.png  # 截图路径
